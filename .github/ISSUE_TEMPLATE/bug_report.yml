name: Bug Report
description: Report a bug to help us improve
title: "[Bug]: "
labels: ["bug", "status: needs triage"]
body:
  - type: dropdown
    id: extension
    attributes:
      label: Which extension are you using?
      options:
        - ParrotJS
        - ParrotPython
        - ParrotPHP
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS version
      placeholder: e.g. macOS 14.5, Windows 11, Ubuntu 24.04
    validations:
      required: true

  - type: input
    id: vscode-version
    attributes:
      label: VS Code version
      placeholder: e.g. 1.92.0
    validations:
      required: true

  - type: input
    id: extension-version
    attributes:
      label: Extension version
      placeholder: e.g. 1.0.0
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Open a .js file
        2. Run command "ParrotJS: Analyze"
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Terminal output
      description: Paste any relevant logs, error messages, or terminal output. This is critical for debugging.
      render: shell
    validations:
      required: false
